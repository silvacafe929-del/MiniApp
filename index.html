<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CiniVIP</title>

<style>
body {
margin: 0;
background: #0f0f0f;
color: white;
font-family: Arial;
}

header {
padding: 20px;
background: #111;
display: flex;
justify-content: space-between;
align-items: center;
}

.logo {
color: red;
font-size: 22px;
font-weight: bold;
}

.banner {
height: 250px;
background: url('https://image.tmdb.org/t/p/original/8Y43POKjjKDGI9MH89NW0NAzzp8.jpg') center/cover;
display: flex;
align-items: end;
padding: 20px;
}

.banner button {
background: red;
border: none;
padding: 10px 15px;
color: white;
cursor: pointer;
margin-top: 10px;
}

.section {
padding: 15px;
}

.row {
display: flex;
gap: 10px;
overflow-x: auto;
}

.card {
min-width: 150px;
background: #222;
border-radius: 10px;
overflow: hidden;
}

.card img {
width: 100%;
}

.card p {
padding: 5px;
font-size: 14px;
}
</style>

</head>

<body>

<header>
<div class="logo">CiniVIP</div>
<a href="https://t.me/SEU_CANAL" style="color:white;">Telegram</a>
</header>

<div class="banner">
<div>
<h2>Filme em Destaque</h2>
<button>Assistir Agora</button>
</div>
</div>

<div class="section">
<h3>🔥 Filmes</h3>
<div class="row">

<div class="card">
<img src="https://image.tmdb.org/t/p/w300/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg">
<p>Exemplo Filme</p>
</div>

<div class="card">
<img src="https://image.tmdb.org/t/p/w300/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
<p>Exemplo 2</p>
</div>

</div>
</div>

</body>
</html>
